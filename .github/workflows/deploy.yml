name: Deploy CestaBasica

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish API
        run: dotnet publish CestaBasica.Api/CestaBasica.Api.csproj -c Release -o ./publish-api

      - name: Deploy API to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cestabasica-app'
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./publish-api

  build-and-deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Web
        run: dotnet publish CestaBasica.Web/CestaBasica.Web.csproj -c Release -o ./publish-web

      - name: Deploy Web to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cestabasica-web'
          publish-profile: ${{ secrets.AZURE_WEB_PUBLISH_PROFILE }}
          package: ./publish-web